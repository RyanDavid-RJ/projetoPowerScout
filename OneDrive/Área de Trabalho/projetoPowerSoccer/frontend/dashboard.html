<!DOCTYPE html>
<html lang="pt-BR">
<head>

    <script>
        // SEGURANÇA: Se não tiver o crachá no localStorage, chuta de volta pro Login
        const usuarioLogado = JSON.parse(localStorage.getItem('usuarioLogado'));
        if (!usuarioLogado) {
            window.location.href = 'login.html';
        }
    </script>
    
    <meta charset="UTF-8">
    <title>Estatísticas - Power Soccer</title>
    <style>
        body { background-color: #1a1a1a; color: white; font-family: Arial; padding: 40px; }
        h1 { color: #8a2be2; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background-color: #2d2d2d; }
        th, td { padding: 15px; text-align: center; border-bottom: 1px solid #444; }
        th { background-color: #4a2b6e; }
        .voltar { color: white; text-decoration: none; background: #444; padding: 10px 15px; border-radius: 5px;}
        .voltar:hover { background: #666; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <a href="index.html" class="voltar">⬅ Voltar para a Coleta</a>
    
    <h1>Estatísticas Globais da Equipe</h1>

    <table>
        <thead>
            <tr>
                <th>Atleta</th>
                <th>Gols</th>
                <th>Finalizações</th>
                <th>Passes Certos</th>
                <th>Passes Errados</th>
                <th>Interceptações</th>
            </tr>
        </thead>
        <tbody id="tabela-corpo">
            </tbody>
    </table>
    <div style="width: 800px; background-color: #2d2d2d; padding: 20px; margin-top: 30px; border-radius: 8px;">
        <h2>Comparativo de Passes Certos</h2>
        <canvas id="graficoPasses"></canvas>
    </div>
    <script src="dashboard.js"></script>
</body>
</html>
