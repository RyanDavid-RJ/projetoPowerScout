<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Painel de Gestão - PowerScout</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Nunito:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .gestao-container {
            max-width: 500px;
            margin: 40px auto;
        }
        .form-grupo {
            margin-bottom: 15px;
            text-align: left;
        }
        .form-grupo label {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
            color: #aaa;
        }
        .form-grupo input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            background: #444;
            color: white;
            border: 2px solid transparent;
            font-family: var(--font-primary);
        }
        .form-grupo input:focus {
            border-color: var(--duo-green-primary);
            outline: none;
        }
        .voltar { color: white; text-decoration: none; display: inline-block; margin: 20px; font-weight: bold; }
        .voltar:hover { color: var(--duo-green-primary); }
    </style>
</head>
<body>
    <script>
        // Trava de segurança da catraca
        const usuarioLogado = JSON.parse(localStorage.getItem('usuarioLogado'));
        if (!usuarioLogado) window.location.href = 'login.html';
    </script>

    <a href="index.html" class="voltar">⬅ Voltar para a Prancheta</a>

    <div class="duo-container gestao-container" style="text-align: center;">
        <h2>Cadastrar <span class="cor-duo">Novo Jogador</span></h2>
        
        <form id="form-jogador" style="margin-top: 20px;">
            <div class="form-grupo">
                <label>Nome do Atleta</label>
                <input type="text" id="nome-atleta" placeholder="Ex: Lucas" required>
            </div>
            
            <div class="form-grupo">
                <label>Número da Camisa</label>
                <input type="number" id="numero-atleta" placeholder="Ex: 10" required>
            </div>

            <div class="form-grupo">
                <label>Foto do Perfil (JPG ou PNG)</label>
                <input type="file" id="foto-atleta" accept="image/png, image/jpeg">
            </div>

            <button type="submit" class="btn-acao btn-duo-primary" style="width: 100%; margin-top: 10px;">Salvar Atleta</button>
        </form>
    </div>

    <script>
        document.getElementById('form-jogador').addEventListener('submit', function(e) {
            e.preventDefault(); // Impede a página de recarregar
            
            const btnSalvar = document.querySelector('button[type="submit"]');
            btnSalvar.textContent = "Salvando...";
            btnSalvar.disabled = true;

            // O FormData é obrigatório quando trabalhamos com arquivos
            const formData = new FormData();
            formData.append('nome', document.getElementById('nome-atleta').value);
            formData.append('numero_camisa', document.getElementById('numero-atleta').value);
            
            const fotoInput = document.getElementById('foto-atleta');
            if (fotoInput.files.length > 0) {
                formData.append('foto', fotoInput.files[0]);
            }

            // O Fetch com FormData NÃO leva cabeçalho 'Content-Type', o navegador faz isso sozinho
            fetch('http://localhost:3000/api/atletas', {
                method: 'POST',
                body: formData
            })
            .then(res => res.json())
            .then(data => {
                alert('Jogador cadastrado com sucesso!');
                document.getElementById('form-jogador').reset();
                btnSalvar.textContent = "Salvar Atleta";
                btnSalvar.disabled = false;
            })
            .catch(erro => {
                console.error(erro);
                alert('Ocorreu um erro no cadastro.');
                btnSalvar.textContent = "Salvar Atleta";
                btnSalvar.disabled = false;
            });
        });
    </script>
</body>
</html>
